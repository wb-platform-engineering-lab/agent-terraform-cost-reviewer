name: Terraform Cost Review

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tfvars"
  push:
    branches: [main, master]
    paths:
      - "**.tf"
      - "**.tfvars"
  workflow_dispatch:          # allow manual trigger from Actions UI
    inputs:
      terraform_path:
        description: "Path to Terraform codebase (default: repo root)"
        default: "."
      fail_under:
        description: "Fail if score below N% (leave blank to never fail)"
        default: ""

jobs:
  cost-review:
    name: Cost Architecture Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install terraform-cost-reviewer
        run: pip install .

      - name: Run cost review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TF_PATH="${{ github.event.inputs.terraform_path || '.' }}"
          THRESHOLD="${{ github.event.inputs.fail_under || vars.COST_REVIEW_FAIL_UNDER || '' }}"

          if [ -n "$THRESHOLD" ]; then
            terraform-cost-review "$TF_PATH" \
              --fail-under "$THRESHOLD" \
              --quiet \
              --output-dir reports/
          else
            terraform-cost-review "$TF_PATH" \
              --quiet \
              --output-dir reports/
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()        # upload even if the review step failed
        with:
          name: cost-review-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: Post summary to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('reports/').filter(f => f.endsWith('.json'));
            if (!files.length) return;

            const summary = JSON.parse(fs.readFileSync(`reports/${files[0]}`, 'utf8'));
            const grade_emoji = summary.grade === 'PASS' ? '✅' : summary.grade === 'AT RISK' ? '⚠️' : '❌';
            const failing = summary.failing_checks.join(', ') || 'none';

            const body = [
              `## ${grade_emoji} Terraform Cost Review — ${summary.score_pct}% (${summary.passing}/${summary.total} checks)`,
              '',
              `| | |`,
              `|---|---|`,
              `| **Grade** | ${summary.grade} |`,
              `| **Est. Monthly Savings** | ${summary.savings_label} |`,
              `| **Failing Checks** | ${failing} |`,
              '',
              summary.action_items.length
                ? `**Top Actions:**\n${summary.action_items.slice(0,3).map((a,i) => `${i+1}. ${a}`).join('\n')}`
                : '',
              '',
              '_Full HTML report available as a pipeline artifact._',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
