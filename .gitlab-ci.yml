# ─────────────────────────────────────────────────────────────────────────────
# Terraform Cost Review — GitLab CI
#
# Required CI/CD variable (Settings → CI/CD → Variables):
#   ANTHROPIC_API_KEY   — your Anthropic API key (mark as Masked + Protected)
#
# Optional CI/CD variables:
#   COST_REVIEW_PATH        — path to Terraform codebase (default: ".")
#   COST_REVIEW_FAIL_UNDER  — fail pipeline if score below N% (default: unset = never fail)
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - cost-review

terraform-cost-review:
  stage: cost-review
  image: python:3.11-slim

  variables:
    COST_REVIEW_PATH: ${COST_REVIEW_PATH:-"."}
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

  cache:
    key: pip-cache
    paths:
      - .cache/pip

  before_script:
    - pip install . --quiet

  script:
    - |
      if [ -n "${COST_REVIEW_FAIL_UNDER}" ]; then
        terraform-cost-review "${COST_REVIEW_PATH}" \
          --fail-under "${COST_REVIEW_FAIL_UNDER}" \
          --quiet \
          --output-dir reports/
      else
        terraform-cost-review "${COST_REVIEW_PATH}" \
          --quiet \
          --output-dir reports/
      fi

  artifacts:
    name: "cost-review-$CI_PIPELINE_IID"
    when: always          # save report even when the job fails
    paths:
      - reports/
    expire_in: 30 days
    reports:
      # Expose the JSON summary in the pipeline UI (GitLab 15.7+)
      # Uses dotenv format — see note below
      dotenv: reports/cost_review.env

  # Only run when .tf or .tfvars files change
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "**/*.tf"
        - "**/*.tfvars"
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - "**/*.tf"
        - "**/*.tfvars"
    - if: '$CI_PIPELINE_SOURCE == "web"'   # allow manual trigger
      when: manual

  # Post the score as a MR note (requires GitLab Runner with API access)
  after_script:
    - |
      if [ -f reports/*.json ] && [ -n "${GITLAB_TOKEN}" ]; then
        JSON=$(ls reports/*.json | head -1)
        SCORE=$(python3 -c "import json,sys; d=json.load(open('$JSON')); print(d['score_pct'])")
        GRADE=$(python3 -c "import json,sys; d=json.load(open('$JSON')); print(d['grade'])")
        SAVINGS=$(python3 -c "import json,sys; d=json.load(open('$JSON')); print(d['savings_label'])")
        FAILING=$(python3 -c "import json,sys; d=json.load(open('$JSON')); print(', '.join(d['failing_checks']) or 'none')")
        MSG="## 💰 Terraform Cost Review — ${SCORE}% (${GRADE})\n\n| | |\n|---|---|\n| **Est. Monthly Savings** | ${SAVINGS} |\n| **Failing Checks** | ${FAILING} |\n\n_Full HTML report available as a pipeline artifact._"
        if [ -n "${CI_MERGE_REQUEST_IID}" ]; then
          curl --silent --request POST \
            --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            --data-urlencode "body=${MSG}" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes"
        fi
      fi
